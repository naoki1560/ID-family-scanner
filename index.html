<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID-Theory: Oracle Scanner</title>
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        h1 {
            letter-spacing: 4px;
            text-shadow: 0 0 10px #00ffff;
            text-align: center;
            margin-bottom: 5px;
        }
        #status {
            color: #ffaa00;
            font-size: 0.8rem;
            margin-bottom: 10px;
            animation: pulse 2s infinite;
            text-align: center;
            padding: 0 10px;
        }
        .container {
            width: 90%;
            max-width: 600px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background-color: #111111;
            border: 1px solid #444;
            color: #00ffff;
            font-size: 1.5rem;
            text-align: center;
            font-family: 'Courier New', Courier, monospace;
            box-sizing: border-box;
            outline: none;
        }
        input:focus {
            border-color: #00ffff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
        }
        .hint {
            color: #666;
            font-size: 0.75rem;
            margin-bottom: 20px;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #111111;
            color: #00ffff;
            border: 1px solid #00ffff;
            font-size: 1.2rem;
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover:not(:disabled) {
            background-color: #00ffff;
            color: #000000;
            box-shadow: 0 0 15px #00ffff;
        }
        button:disabled {
            color: #444;
            border-color: #444;
            cursor: not-allowed;
        }
        #result-box {
            margin-top: 40px;
            min-height: 180px;
        }
        .action-text {
            color: #aaaaaa;
            font-size: 1rem;
            animation: blink 0.5s infinite;
        }
        .family-text {
            font-size: 2.2rem;
            font-weight: bold;
            color: #00ffff;
            text-shadow: 0 0 20px #00ffff;
            margin: 10px 0;
        }
        .dna-box {
            background-color: #111;
            border: 1px solid #333;
            padding: 10px;
            margin: 10px 0;
            font-size: 0.85rem;
            line-height: 1.6;
        }
        .hidden-data {
            color: #555555;
            font-size: 0.75rem;
            margin-top: 10px;
        }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        @keyframes blink { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }
    </style>
</head>
<body>

<div class="container">
    <h1>ORACLE SCANNER</h1>
    <div id="status">CSVデータをロード中...お待ちください</div>
    
    <input type="text" id="formulaInput" placeholder="e.g. C6H6, CHCl3, C2H5OH" autocomplete="off" disabled>
    <div class="hint">※カッコ()は使わず入力してください。大文字・小文字を区別します。</div>
    <button id="scanBtn" onclick="runScan()" disabled>DECODE TOPOLOGY</button>

    <div id="result-box"></div>
</div>

<script>
    let SEEDS = {};
    const CSV_FILENAME = "coords.csv"; // GitHubにアップロードしたファイル名

    // 起動時にCSVを読み込む
    async function loadCSV() {
        if (window.location.protocol === 'file:') {
            document.getElementById('status').innerText = "⚠️ ローカルからは実行できません。GitHub PagesのURLからアクセスしてください。";
            document.getElementById('status').style.color = "#ff4444";
            return;
        }

        try {
            const response = await fetch(CSV_FILENAME);
            if (!response.ok) throw new Error("File not found");
            const text = await response.text();
            
            const lines = text.split(/\r?\n/);
            const headers = lines[0].replace(/^\uFEFF/, '').split(',');
            
            const symIdx = headers.indexOf('Symbol');
            const yIdx = headers.indexOf('Y_Int');
            const wIdx = headers.indexOf('W_Int');

            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const cols = lines[i].split(',');
                const symbol = cols[symIdx] ? cols[symIdx].trim() : "";
                if (symbol) {
                    SEEDS[symbol] = {
                        Y: parseFloat(cols[yIdx]),
                        W: parseFloat(cols[wIdx])
                    };
                }
            }
            
            document.getElementById('status').innerText = `✅ 全118元素データベース接続完了`;
            document.getElementById('status').style.color = "#00ff00";
            document.getElementById('formulaInput').disabled = false;
            document.getElementById('scanBtn').disabled = false;

        } catch (error) {
            document.getElementById('status').innerText = `⚠️ エラー: ${CSV_FILENAME} が見つかりません。`;
            document.getElementById('status').style.color = "#ff4444";
        }
    }

    // 化学式のパース
    function parseFormula(formula) {
        let comp = {};
        let regex = /([A-Z][a-z]*)(\d*)/g;
        let match;
        while ((match = regex.exec(formula)) !== null) {
            let element = match[1];
            let count = match[2] ? parseInt(match[2], 10) : 1;
            comp[element] = (comp[element] || 0) + count;
        }
        return comp;
    }

    // トポロジー・アトラクター (2次元空間の基準点)
    const ATTRACTORS = [
        { name: "ALKANE (アルカン)", t: 0.968, f: 0, req: c => c.C > 0 },
        { name: "AROMATIC (芳香族)", t: 0.966, f: 4, req: c => c.C > 0 },
        { name: "ALCOHOL/ETHER (アルコール等)", t: 0.958, f: 0, req: c => c.O > 0 },
        { name: "KETONE/ACID (ケトン等)", t: 0.961, f: 1, req: c => c.O > 0 },
        { name: "WATER/INORGANIC (水/無機物)", t: 0.955, f: 4, req: c => c.C === 0 || c.O > 0 },
        { name: "AMINE (アミン)", t: 0.961, f: 0, req: c => c.N > 0 },
        { name: "NITRO (ニトロ)", t: 0.950, f: 1, req: c => c.N > 0 && c.O > 0 },
        { name: "HALIDE (ハロゲン)", t: 0.968, f: 0, req: c => c.X > 0 },
        { name: "ALKENE (アルケン)", t: 0.965, f: 1, req: c => c.C > 0 }
    ];

    // ID理論 エンジン・コア
    function calculateTopology(formula) {
        let comp = parseFormula(formula);
        if (Object.keys(comp).length === 0) return { error: "解析不能な形式です。" };

        let Y_sum = 0, W_sum = 0;
        let c_counts = {
            C: comp['C'] || 0,
            H: comp['H'] || 0,
            N: comp['N'] || 0,
            O: comp['O'] || 0,
            X: (comp['F']||0) + (comp['Cl']||0) + (comp['Br']||0) + (comp['I']||0)
        };

        for (const [e, count] of Object.entries(comp)) {
            if (SEEDS[e]) {
                Y_sum += SEEDS[e].Y * count;
                W_sum += SEEDS[e].W * count;
            } else {
                return { error: `未知の元素が含まれています: ${e}` };
            }
        }

        let tension_ratio = W_sum > 0 ? Y_sum / W_sum : 1.0;
        let folding = c_counts.C === 0 ? 4.0 : Math.max(0.0, c_counts.C + 1 - (c_counts.H / 2) + (c_counts.N / 2) - (c_counts.X / 2));

        // 流体トポロジー（ガウス距離）によるDNA解析
        let weights = [];
        let total_w = 0;

        ATTRACTORS.forEach(a => {
            if (a.req(c_counts)) {
                // 張力は変動幅が小さいため100倍して距離をスケール
                let d2 = Math.pow((tension_ratio - a.t) * 100, 2) + Math.pow(folding - a.f, 2);
                let w = Math.exp(-d2 / 2.0);
                weights.push({ name: a.name, w: w });
                total_w += w;
            }
        });

        // ％に変換してソート
        weights.forEach(a => { a.percent = total_w > 0 ? (a.w / total_w) * 100 : 0; });
        weights.sort((a, b) => b.percent - a.percent);

        let primary_family = (weights.length > 0 && weights[0].percent > 50) ? weights[0].name.split(" ")[0] : "HYBRID TOPOLOGY";
        if (weights.length === 0) primary_family = "UNKNOWN HYBRID";

        return { family: primary_family, tension_ratio, folding, dna: weights };
    }

    // スキャン実行
    function runScan() {
        let formula = document.getElementById('formulaInput').value.trim();
        let resultBox = document.getElementById('result-box');
        if (formula === "") return;

        let result = calculateTopology(formula);
        if (result.error) {
            resultBox.innerHTML = `<p style='color: #ff4444;'>${result.error}</p>`;
            return;
        }

        resultBox.innerHTML = "<div class='action-text'>Accessing Cosmic Tensors...</div>";
        setTimeout(() => { resultBox.innerHTML = "<div class='action-text'>Calculating Topological DNA Blend...</div>"; }, 500);

        setTimeout(() => {
            // DNA（割合）のHTML生成 (トップ3まで表示)
            let dnaHtml = result.dna.slice(0, 3).map(d => 
                `<span style="color:#00ffff;">${d.name}</span> <span style="color:#aaa;">${d.percent.toFixed(1)}%</span>`
            ).join(' <br> ');

            if(result.dna.length === 0) dnaHtml = "<span style='color:#aaa;'>NO MATCHING ATTRACTORS</span>";

            resultBox.innerHTML = `
                <div style="color: #ffffff; font-size: 1.2rem; margin-bottom: 5px;">[ ${formula} ]</div>
                <div class="family-text">${result.family}</div>
                <div class="dna-box">${dnaHtml}</div>
                <div class="hidden-data">Y/W RATIO: ${result.tension_ratio.toFixed(5)} | DBE: ${result.folding.toFixed(1)}</div>
            `;
        }, 1200);
    }

    document.getElementById("formulaInput").addEventListener("keypress", function(event) {
        if (event.key === "Enter" && !document.getElementById('scanBtn').disabled) {
            event.preventDefault();
            runScan();
        }
    });

    window.onload = loadCSV;
</script>

</body>
</html>
